<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Category Timer</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #e0e7ff;
      --danger: #ef4444;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --radius: 18px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .add-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(99,102,241,0.35);
      transition: transform 0.1s, background 0.1s;
    }
    .add-btn:active { transform: scale(0.92); background: var(--primary-dark); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 14px;
      padding: 18px 16px;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
      font-size: 15px;
      line-height: 1.6;
    }
    .empty-state strong { color: var(--text); display: block; font-size: 17px; margin-bottom: 6px; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .card.tracking {
      border-color: var(--primary);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-height: 28px;
    }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      border-radius: 6px;
      padding: 2px 4px;
      margin: -2px -4px;
      transition: background 0.15s;
    }
    .card-name:hover { background: var(--primary-light); }
    .card-name:active { background: var(--primary-light); }

    .icon-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--border);
      color: var(--text-muted);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:active { background: var(--danger); color: #fff; }

    .card-time {
      font-size: 30px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
      text-align: center;
      color: var(--primary);
      line-height: 1;
      padding: 4px 0;
    }

    /* ── Hold button ── */
    .hold-btn {
      width: 100%;
      padding: 14px 10px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      touch-action: none;
      transition: background 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    .hold-btn:not(.active):active { transform: scale(0.97); }
    .hold-btn.active {
      background: var(--primary-dark);
      animation: pulse-ring 1.2s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(99,102,241,0.45); }
      70%  { box-shadow: 0 0 0 8px rgba(99,102,241,0); }
      100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0));
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h2 { font-size: 18px; font-weight: 700; }

    .modal-input {
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      color: var(--text);
      background: var(--bg);
    }
    .modal-input:focus { border-color: var(--primary); background: #fff; }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      flex: 1;
      padding: 13px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
    }
    .btn-cancel:active { background: var(--border); }

    .btn-confirm {
      flex: 1;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-confirm:active { background: var(--primary-dark); }
  </style>
</head>
<body>

<header>
  <h1>Category Timer</h1>
  <button class="add-btn" id="openModal" aria-label="Add category">+</button>
</header>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal">
    <h2 id="modalTitle">New Category</h2>
    <input class="modal-input" id="catName" type="text" placeholder="e.g. Work, Exercise…" maxlength="30" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-cancel" id="closeModal">Cancel</button>
      <button class="btn-confirm" id="confirmAdd">Add</button>
    </div>
  </div>
</div>

<script>
  // ── Persistence ───────────────────────────────────────────────────────────
  const STORAGE_KEY = 'category-timer-v1';

  function saveState() {
    const data = {
      nextId,
      categories: categories.map(c => ({
        id: c.id,
        name: c.name,
        accumulated: c.isTracking ? c.accumulated + (Date.now() - c.startTime) : c.accumulated,
        isTracking: false,
        startTime: null,
      })),
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch { return null; }
  }

  // ── State ──────────────────────────────────────────────────────────────────
  const saved = loadState();
  let categories = saved ? saved.categories : [];
  let nextId = saved ? saved.nextId : 1;
  let rafId  = null;

  // ── Utilities ──────────────────────────────────────────────────────────────
  function formatTime(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return [h, m, s].map(n => String(n).padStart(2, '0')).join(':');
  }

  function liveMs(cat) {
    return cat.isTracking ? cat.accumulated + (Date.now() - cat.startTime) : cat.accumulated;
  }

  // ── Ticker (rAF loop, only while something is tracking) ───────────────────
  function tick() {
    const any = categories.some(c => c.isTracking);
    if (!any) { rafId = null; return; }
    categories.forEach(cat => {
      if (!cat.isTracking) return;
      const el = document.getElementById('t' + cat.id);
      if (el) el.textContent = formatTime(liveMs(cat));
    });
    rafId = requestAnimationFrame(tick);
  }

  function ensureTicking() {
    if (!rafId) rafId = requestAnimationFrame(tick);
  }

  // ── Tracking actions ───────────────────────────────────────────────────────
  function startTracking(id) {
    const cat = categories.find(c => c.id === id);
    if (!cat || cat.isTracking) return;
    cat.isTracking = true;
    cat.startTime  = Date.now();
    updateCardState(cat);
    ensureTicking();
  }

  function stopTracking(id) {
    const cat = categories.find(c => c.id === id);
    if (!cat || !cat.isTracking) return;
    cat.accumulated += Date.now() - cat.startTime;
    cat.isTracking = false;
    cat.startTime  = null;
    updateCardState(cat);
    saveState();
  }

  function resetCategory(id) {
    const cat = categories.find(c => c.id === id);
    if (!cat) return;
    cat.accumulated = 0;
    cat.isTracking  = false;
    cat.startTime   = null;
    updateCardState(cat);
    saveState();
  }

  // ── DOM helpers (surgical updates to avoid full re-render) ─────────────────
  function updateCardState(cat) {
    const card    = document.getElementById('c' + cat.id);
    const timeEl  = document.getElementById('t' + cat.id);
    const holdBtn = document.getElementById('h' + cat.id);
    if (!card) return;

    card.classList.toggle('tracking', cat.isTracking);
    if (timeEl)  timeEl.textContent  = formatTime(liveMs(cat));
    if (holdBtn) {
      holdBtn.classList.toggle('active', cat.isTracking);
      holdBtn.textContent = cat.isTracking ? '● TRACKING' : 'HOLD';
    }
  }

  // ── Card creation ──────────────────────────────────────────────────────────
  function createCard(cat) {
    const card = document.createElement('div');
    card.className = 'card' + (cat.isTracking ? ' tracking' : '');
    card.id = 'c' + cat.id;

    // header row
    const header = document.createElement('div');
    header.className = 'card-header';

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.id = 'n' + cat.id;
    nameEl.textContent = cat.name;
    nameEl.title = 'Rename';
    nameEl.addEventListener('click', () => openRenameModal(cat.id));

    const resetBtn = document.createElement('button');
    resetBtn.className = 'icon-btn';
    resetBtn.title = 'Reset';
    resetBtn.innerHTML = '&#8635;';
    resetBtn.addEventListener('click', () => resetCategory(cat.id));

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'icon-btn';
    deleteBtn.title = 'Delete';
    deleteBtn.innerHTML = '&times;';
    deleteBtn.addEventListener('click', () => deleteCategory(cat.id));

    header.appendChild(nameEl);
    header.appendChild(resetBtn);
    header.appendChild(deleteBtn);

    // time display
    const timeEl = document.createElement('div');
    timeEl.className = 'card-time';
    timeEl.id = 't' + cat.id;
    timeEl.textContent = formatTime(liveMs(cat));

    // hold button
    const holdBtn = document.createElement('button');
    holdBtn.className = 'hold-btn' + (cat.isTracking ? ' active' : '');
    holdBtn.id = 'h' + cat.id;
    holdBtn.textContent = cat.isTracking ? '● TRACKING' : 'HOLD';

    holdBtn.addEventListener('mousedown',   () => startTracking(cat.id));
    holdBtn.addEventListener('mouseup',     () => stopTracking(cat.id));
    holdBtn.addEventListener('mouseleave',  () => stopTracking(cat.id));
    holdBtn.addEventListener('touchstart',  (e) => { e.preventDefault(); startTracking(cat.id); }, { passive: false });
    holdBtn.addEventListener('touchend',    (e) => { e.preventDefault(); stopTracking(cat.id);  }, { passive: false });
    holdBtn.addEventListener('touchcancel', ()  => stopTracking(cat.id));
    holdBtn.addEventListener('contextmenu', (e) => e.preventDefault());

    card.appendChild(header);
    card.appendChild(timeEl);
    card.appendChild(holdBtn);

    return card;
  }

  // ── Full render (initial + after add) ─────────────────────────────────────
  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (categories.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<strong>No categories yet</strong>Tap <b>+</b> to add your first one.';
      grid.appendChild(empty);
      return;
    }

    categories.forEach(cat => grid.appendChild(createCard(cat)));
  }

  // ── Delete / rename actions ────────────────────────────────────────────────
  function deleteCategory(id) {
    const idx = categories.findIndex(c => c.id === id);
    if (idx === -1) return;
    categories.splice(idx, 1);
    saveState();
    const card = document.getElementById('c' + id);
    if (card) card.remove();
    const grid = document.getElementById('grid');
    if (grid.children.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<strong>No categories yet</strong>Tap <b>+</b> to add your first one.';
      grid.appendChild(empty);
    }
  }

  function renameCategory(id, newName) {
    const cat = categories.find(c => c.id === id);
    if (!cat) return;
    cat.name = newName;
    saveState();
    const nameEl = document.getElementById('n' + id);
    if (nameEl) nameEl.textContent = newName;
  }

  // ── Modal ──────────────────────────────────────────────────────────────────
  const overlay   = document.getElementById('modalOverlay');
  const catInput  = document.getElementById('catName');
  const modalTitle = document.getElementById('modalTitle');
  const confirmBtn = document.getElementById('confirmAdd');

  let editingId = null;

  function openModal() {
    editingId = null;
    modalTitle.textContent = 'New Category';
    confirmBtn.textContent = 'Add';
    catInput.value = '';
    overlay.classList.add('open');
    setTimeout(() => catInput.focus(), 120);
  }

  function openRenameModal(id) {
    const cat = categories.find(c => c.id === id);
    if (!cat) return;
    editingId = id;
    modalTitle.textContent = 'Rename Category';
    confirmBtn.textContent = 'Save';
    catInput.value = cat.name;
    overlay.classList.add('open');
    setTimeout(() => { catInput.focus(); catInput.select(); }, 120);
  }

  function closeModal() {
    overlay.classList.remove('open');
    catInput.blur();
    editingId = null;
  }

  function confirmAdd() {
    const name = catInput.value.trim();
    if (!name) { catInput.focus(); return; }

    if (editingId !== null) {
      renameCategory(editingId, name);
      closeModal();
      return;
    }

    const cat = { id: nextId++, name, accumulated: 0, isTracking: false, startTime: null };
    categories.push(cat);
    saveState();
    closeModal();
    const grid = document.getElementById('grid');
    const empty = grid.querySelector('.empty-state');
    if (empty) empty.remove();
    grid.appendChild(createCard(cat));
  }

  document.getElementById('openModal').addEventListener('click', openModal);
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('confirmAdd').addEventListener('click', confirmAdd);
  catInput.addEventListener('keydown', e => {
    if (e.key === 'Enter')  confirmAdd();
    if (e.key === 'Escape') closeModal();
  });
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  // ── Boot ───────────────────────────────────────────────────────────────────
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') saveState();
  });
  window.addEventListener('pagehide', saveState);

  render();
</script>
</body>
</html>
